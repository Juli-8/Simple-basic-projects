<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator2</title>
</head>
<body>
 <div class="container">
  <div class="calculator">
    <form>
    <h2>Basic Calculator</h2>
     <div class="display">
      <!--The input display input-->
        <input type="text" name="display"readonly placeholder="0 ">
      </div>
      <div>
       <input type="button" value="AC" class="spa"  onclick="display.value=''">
      <input type="button" value="DE"class="spa" onclick="display.value= display.value.toString().slice(0,-1)">
      <input type="button" value="."class="spa" onclick="display.value +='.'">
      <input type="button" value="/"class="spa" onclick="display.value +='/'">         
      </div>
    
      <div>
       <input type="button" value="7" onclick="display.value +=7">
      <input type="button" value="8" onclick="display.value +=8">
      <input type="button" value="9" onclick="display.value +=9">
      <input type="button" value="*"class="spa" onclick="display.value +='*'">         
      </div>
      
      <div>
       <input type="button" value="4" onclick="display.value +=4">
      <input type="button" value="5" onclick="display.value +=5">
      <input type="button" value="6" onclick="display.value +=6">
      <input type="button" value="-" class="spa" onclick="display.value +='-' ">         
      </div>
  
      <div>
       <input type="button" value="1" onclick="display.value +=1">
      <input type="button" value="2" onclick="display.value +=2">
      <input type="button" value="3" onclick="display.value +=3">
      <input type="button" value="+"class="spa" onclick="display.value +='+'">         
      </div>
      
      <div>
       <input type="button" value="00" onclick="display.value +='00'">
      <input type="button" value="0" onclick="display.value +='0'">
      <input type="button" value="=" class="equal" onclick="display.value = eval(display.value)">       
      </div>
    </form>

  </div>
 </div>
 <style>
.container{
 
  width:100%;
  height:100vh;
  background-color: #e3f9ff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.calculator{


  background: #2b333d;
  padding: 20px;
  border-radius: 10px;
}
.calculator form input{
 border: 0;
 outline: 0;
width:60px;
height:60px;
border-radius: 10px;
box-shadow: -8px -8px 15px rgba(255,255,255,0.1),5px 5px 15px rgba(0,0,0,0.2);
background-color: transparent;
font-size: 30px;
color:whitesmoke;
margin:10px;
cursor:pointer;
}

.display{
 display: flex;
 justify-content: flex-end;
 margin: 20px 0;

}
.display input{
text-align: right;
 flex:1;
 font-size:45px;
 box-shadow: none;
border:none;
}
form input.equal{
  width:140px;
  color:rgb(55, 55, 219);

}
form input.spa{
  color:rgb(55, 138, 158);
}
h2{
  text-align: center;
  color:whitesmoke;
  margin-bottom: 15px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 20px;
  font-weight: bold;
  font-style: italic;
}
 </style> 
</body>
</html>
