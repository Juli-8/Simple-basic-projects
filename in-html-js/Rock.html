<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock, Paper, Scissors</title>
</head>
<body>
  <header>
    <h1>Game Time..</h1>
    <button onclick="
     pickMove();
    let Result='';
    if(computerMove==='Rock'){
      Result='Tie..'
    }
    
    else if(computerMove==='Paper'){
      Result='You Lose';
    }
    else if(computerMove==='Scissors'){
      Result='You Win';
    }
    
    alert(`You Picked Rock. Computer Picked${computerMove}.${Result}`);
   
    "      
    >Rock</button>


    <button onclick="
     pickMove();
    let Result='';
    if(computerMove===' Paper'){
      Result='Tie..'
    }
    
    else if(computerMove==='Rock'){
      Result='You Win';
    }
    else if(computerMove==='Scissors'){
      Result='You Lose';
    }
    
    alert(`You Picked Paper. Computer Picked${computerMove}.${Result}`);
    
    ">
    Paper</button>
    <button onclick="
    
     pickMove();
     const Game={
  Wins:0,
  Losses:0,
  Ties:0
 };
    let Result='';
    if(computerMove==='Scissors'){
      Result='Tie..'
    }
    
    else if(computerMove==='Paper'){
      Result='You Win';
    }
    else if(computerMove==='Rock'){
      Result='You Lose';
    }
       if(Result==='You Win'){
    Game.Wins +=1;
  }
  else if(Result==='You Lose'){
    Game.Losses +=1;
  }

  else if(Result==='Tie..'){
    Game.Ties +=1;
  } 



   alert(`You Picked Scissors. Computer Picked${computerMove}.${Result} 
  Wins:${Game.Wins}, Losses:${Game.Losses}, Ties:${Game.Ties}
    `);
   
    
 
    
    ">Scissors</button>
    <button onclick="
   Game.Wins=0;
   Game.Losses=0;
   Game.Ties=0;

    
    "
    
    
    
    
    
    >Reset Game</button>
  </header>
</body>

<script>
 
  let computerMove='';
  function pickMove(){
     const Number=Math.random();
  if(Number>=0 && Number<1/3){
    computerMove='Rock';
  }
    else if(Number>=1/3 && Number<2/3){
      computerMove='Paper';
    } 
    else if(Number>=2/3 && Number<1){
      computerMove='Scissors';
    }
  }

  





</script>








</html>
