<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <title>To DoList</title>
</head>
<body>
  <div class="container">
    <div class="dolist">
      <h3>To Do List <img src="jott.png" ></h3>
      <div class="inp">
        <input type="text" id="inputBox" placeholder="Write down Your List  ">
        <button onclick="Addlist()">Add</button>
      </div>
      <ul id="list-display">
        <!--
      <li class="checked">Task1</li>
        <li >Task2</li>
        <li  >Task3</li>
      -->
     

      </ul>

    </div>

  </div>

<style>
.container{
  display:flex;
  justify-content: center;
  width:100%;
  height:50%;
  padding:10px;
}

.dolist{
  width:100%;
  max-width: 540px;
  background-color:hsl(332, 75%, 11%);
  margin:100px, auto 25%;
  padding: 40px;
  border-radius: 10px;
  gap:20px;
}
.dolist h3{
  color:#666060;
  display: flex;
  align-items: center;
  margin-bottom:20px;
}
.dolist h3 img{
  width:30px;
  height:30px;
  border-radius: 4px;

}


ul li{
  color:hsl(40, 95%, 50%);
  user-select: none;
  list-style: none;
  padding: 12px 8px 12px 50px;
  font-size: 16px;
  position: relative;
  cursor: pointer;
}

.inp {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgb(184, 180, 180);
  border-radius: 40px;
  padding-left: 25px;
  margin-bottom: 30px;
}
input{
  flex:1;border:none;
  outline:none;
  background-color: transparent;
  padding:10px;
  font-weight:bold;
  overflow: scroll;
  font-size: 16px;
}
button{
  border:none;
  outline: none;
  padding: 16px 50px;
  background-color:hsl(40, 95%, 50%);
  color:#302b2b;
  border-radius: 40px;
  font-size: 18px;
  cursor: pointer;
  font-size: 1.5rem;
  font-weight: bold;

}
button:hover{
  background-color: hsl(40, 77%, 54%);
  transition: 1ms;
  color:whitesmoke
}
button:active{
   background-color:hsl(113, 98%, 50%);
  transition: 1.5ms;
  color:whitesmoke;
}
ul li::before{
  content: '';
  position: absolute;
  height:27px;
  width:27px;
  border-radius: 50px;
  background:white;
  background-size: contain;
  background-position: center;
  top: 5px;
  left:8px;
  border:none;
  pointer-events: none;

}
ul li.checked{
color: hsl(40, 81%, 56%);;
text-decoration:line-through double;
}
ul li.checked::before{
  content: '\2713';
  background: #f0ab15;
  color:rgb(49, 199, 82);
  border: 2px solid #d5e097;
  display: flex;
  justify-content: center;
  font-size: 24px;
  font-weight: bold;
  align-items: center;
}
ul li span{
  position:absolute;
  top:5px;
  right:0;
  width: 40px;
  height: 40px;
  font-size:larger;
  color:#f30707;
  line-height: 40px;
  text-align: center;
  border-radius: 50px;
  font-weight: bolder;
}
ul li span:hover{
  background:silver;
  transition: 1ms;
}
ul li span:active{
  background: silver;
  color:hsl(0, 90%, 51%)
}
ul li .edit{
  color:rgb(153, 139, 18);
  cursor: pointer;
 top:5px;
  font-size: 14px;
  position: absolute;
  right: 45px;
}






</style>

<script src="script.js"></script>









</body>
</html>
