<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Calculator</title>
</head>
<body>
  <div id="Calculator">
    <h2>Scientific Calculator</h2>
    <input type="text" id="display" readonly placeholder="0">
  <div id="keysButton">
   <!--the buttons setup, specialnumbers, numbers and operators has their separate div-->
   <button onclick="toggleInv()" class="spec" id="invbutton">INV</button>
    <button onclick="toggleDeg()" class="spec" id="deg">DEG</button>
    <button onclick="clearToDisplay('')" class="cl">CL</button>
    <button onclick="sinFunction()" class="spec" id="sinbutton">sin</button>
    <button onclick="cosFunction()" class="spec" id="cosbutton">cos</button>
    <button onclick="tanFunction()" class="spec" id="tanbutton">tan</button>
    <button onclick="addToDisplay('In(')" class="spec">In</button>
    <button onclick="addToDisplay('log(')" class="spec">log</button>
    <button onclick="addToDisplay('sqrt(')" class="spec">&radic;</button>
      <button onclick="factorial ()" class="spec">x!</button>
    <button onclick="addToDisplay('^')" class="spec">^</button>
    <button onclick="addToDisplay('Math.E')" class="spec">e</button>
    <button onclick="addToDisplay('Math.PI')" class="spec">PI</button>
    <button onclick="addToDisplay ('(')" class="spec">(</button>
     <button onclick="addToDisplay (')')" class="spec">)</button>
    <button onclick="square()" class="spec">X <sup>2</sup></button>
    <button onclick="addToDisplay('.')" class="spec">.</button>
     <button onclick="addToDisplay('%')" class="spec">%</button>
    <button onclick="addToDisplay('7')">7</button>
    <button onclick="addToDisplay('8')">8</button>
    <button onclick="addToDisplay('9')">9</button>
    <button onclick="addToDisplay('4')">4</button>
    <button onclick="addToDisplay('5')">5</button>
    <button onclick="addToDisplay('6')">6</button>
    <button onclick="addToDisplay('1')">1</button>
    <button onclick="addToDisplay('2')">2</button>
    <button onclick="addToDisplay('3')">3</button>
     <button onclick="addToDisplay('0')">0</button>
     <button onclick="addToDisplay('00')">00</button>
     <button onclick="addToDisplay('0.')">0.</button>
    <button onclick="Del()" class="cl">DEL</button>
     <button onclick="addToDisplay('/')"class="op">&divide;</button>
    <button onclick="addToDisplay('*')"class="op">*</button>
    <button onclick="addToDisplay('-')" class="op">-</button>
    <button onclick="addToDisplay('+')" class="op">+</button>
    <button onclick="calculate()" class="equal" >=</button>
  

  </div>
  </div>
<style>
button{
  width:60px;
  height:60px;
  border-radius: 15px;
  border: 0 none;
  background-color:hsl(0, 0%, 30%);
  color:whitesmoke;
  font-size: 1.2rem;
  font-weight: bold;
  text-decoration:dotted;
  cursor: pointer;
 outline: 0;
box-shadow: -8px -8px 15px rgba(255,255,255,0.1),5px 5px 15px rgba(0,0,0,0.2);
margin:10px;
cursor:pointer;
}
button:hover{
   background-color: hsl(0,0%, 50%);
   color:#9cfcdc;
   opacity: 100%;
}
button:active{
   background-color: hsl(0,0%, 75%);
}
#keysButton{
display:grid;
grid-template-columns: repeat(6,1fr);
gap:6px;
padding:20px;
}
#Calculator{
  background-color: hsl(0,0%, 15%);
  border-radius: 10px;
  max-width: 600px;
  overflow: hidden;
}
#display{
  width: 100%;
  padding:20px;
  border:none;
  font-size: 2rem;
  text-align: right;
   background-color: hsl(0,0%, 20%);
   color:white;
   opacity: 100%;
   overflow: auto;
   white-space: nowrap;
   box-sizing: border-box;

}
body{
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
   background-color: hsl(0,0%, 95%);
}
.spec{
  background-color:#67531f;
  opacity:100%;
  color:#9cfcdc;
}
.spec:hover{
  background-color: hsl(35, 94%, 51%);
}
.spec:active{
  background-color: hsl(35,100%, 60%);
}
.op{
  background-color:hsl(249, 91%, 54%);
  
}
.op:hover{
background-color:hsl(249, 84%, 75%);
}
.op:active{
background-color:hsl(249, 84%, 95%);
}
.equal{
  background-color: hsl(129, 73%, 38%);
    color: black;
    border-radius: 15px;
    height:70px;
    width:60px;
     border: 0 none;
  color:whitesmoke;
  font-size: 1.2rem;
  font-weight: bold;
  text-decoration:dotted;
  cursor: pointer;
 outline: 0;
box-shadow: -8px -8px 15px rgba(255,255,255,0.1),5px 5px 15px rgba(0,0,0,0.2);
margin:10px;
cursor:pointer
  
}
.equal:hover{
  background-color: hsl(129, 73%, 65%);
  color: rgb(254, 77, 77);
}
.equal:active{
  background-color: hsl(129, 91%, 64%);

  color: rgb(254, 77, 77);
}
.cl{
  background-color: hsl(0, 82%, 9%);
  color:whitesmoke;
}
.cl:hover{
   background-color: hsl(0, 82%, 60%);
   color: black;
}
.cl:active{
 background-color: hsl(0, 82%, 65%);
 color: black;
}
h2{
  text-align: center;
  color:whitesmoke;
  margin-bottom: 15px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 20px;
  font-weight: bold;
  font-style: italic;

}
</style>

<script>
const display = document.getElementById('display');
function addToDisplay(input){
display.value +=input;
}

function clearToDisplay(){
display.value ='';
}

function calculate(){
  let expression =display.value;
  expression = expression.replace (/asin\(/g, "Math.sin(");
  expression = expression.replace(/acos\(/g, "Math.cos(");
  expression = expression.replace(/atan\(/g, "Math.tan(");
  expression = expression.replace(/log\(/g, "Math.log10(");
  expression = expression.replace(/In\(/g, "Math.log(");
  expression = expression.replace(/sqrt\(/g, "Math.sqrt(");
  expression = expression.replace(/\^/g, "**");
  expression = expression.replace(/pi/g, "Math.PI");
  expression = expression.replace(/(\d+(\.\d+)?)%/g, "($1/100)");
  

 
  
  
  
  
  
display.value = eval(expression);
}
function Del(){
  display.value = display.value.toString().slice(0,-1);
}
function toggleInv(){
  inverseMode=!inverseMode;
}
function squareRoot(){
  display.value=`&radic(${display.value})`;
}

function factorial(){
  let n =Number(display.value);
  if(n < 0){
    display.value = "Error";
    return;
  }
  let result = 1;
  for ( let i =1; i <= n; i++){
    result *= i;
  }
  display.value = result;
}
function square(){
  display.value=Math.pow(Number(display.value), 2);
}
let inverseMode = false;
function toggleInv(){
  inverseMode = !inverseMode;
  const buttonInv= document.getElementById('invbutton');buttonInv.textContent = inverseMode ? "INV ON" : "INV";
  document .getElementById('sinbutton').innerHTML = inverseMode ?"sin<sup>-1</sup>": "sin";
  document .getElementById('cosbutton').innerHTML = inverseMode ?"cos<sup>-1</sup>": "cos";
  document .getElementById('tanbutton').innerHTML = inverseMode ?"tan<sup>-1</sup>": "tan";

}
let isDegree = true;
 function toggleDeg(){
  isDegree = !isDegree;
  const button= document.getElementById('deg'); button.textContent = isDegree ? "DEG" : "RAD";
 }
 function sinFunction(){
  if (inverseMode){
    addToDisplay("asin(");
  }
  else{
    addToDisplay("sin(");
  }
 }
  function cosFunction(){
  if (inverseMode){
    addToDisplay("acos(");
  }
  else{
    addToDisplay("cos(");
  }
 }
 function tanFunction(){
  if (inverseMode){
    addToDisplay("atan(");
  }
  else{
    addToDisplay("tan(");
  }
 }






</script>






  
</body>
</html>
